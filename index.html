<!DOCTYPE html>
<html>
<head>
  <title>NiftyDataHub</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      color:white;
    }

    header{
      background:#161616;
      padding:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:2px solid #00e5ff;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#00e5ff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:15px;
      font-size:15px;
    }

    .hero{
      padding:40px 20px;
      text-align:center;
    }

    .hero h1{
      font-size:38px;
      margin-bottom:10px;
    }

    .hero p{
      color:#aaa;
      margin-bottom:20px;
    }

    .btn{
      background:#00e5ff;
      color:black;
      padding:12px 20px;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      display:inline-block;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1b1b1b;
      padding:20px;
      border-radius:15px;
      border:1px solid #2a2a2a;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#00e5ff;
    }

    .card h2{
      color:#00e5ff;
      margin-bottom:10px;
    }

    .price{
      font-size:30px;
      font-weight:bold;
    }

    footer{
      text-align:center;
      padding:30px;
      color:#777;
    }

  </style>

</head>

<body>

<header>

  <div class="logo">
    NiftyDataHub
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Market</a>
    <a href="#">News</a>
    <a href="#">Contact</a>
  </nav>

</header>

<section class="hero">

  <h1>Indian Stock Market Dashboard</h1>

  <p>
    Live Market Data, Analysis & Insights
  </p>

  <a href="#" class="btn">
    Explore Market
  </a>

</section>

<section class="cards">

  <div class="card">
    <h2>NIFTY 50</h2>
    <div class="price">24,500</div>
  </div>

  <div class="card">
    <h2>BANK NIFTY</h2>
    <div class="price">52,000</div>
  </div>

  <div class="card">
    <h2>SENSEX</h2>
    <div class="price">80,000</div>
  </div>

  <div class="card">
    <h2>FINNIFTY</h2>
    <div class="price">24,100</div>
  </div>

</section>

<footer>
  © 2026 NiftyDataHub
</footer>

</body>
</html>
