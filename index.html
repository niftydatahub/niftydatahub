<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiftyDataHub Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

header{
position:sticky;
top:0;
z-index:1000;
background:#0d0d0d;
padding:18px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00d9ff;
}

.logo{
font-size:32px;
font-weight:bold;
color:#00d9ff;
}

.theme-btn{
padding:10px 16px;
border:none;
border-radius:10px;
background:#00d9ff;
color:black;
font-weight:bold;
cursor:pointer;
}

.market-status{
background:#101010;
padding:10px;
text-align:center;
font-size:14px;
color:#00ff88;
border-bottom:1px solid #222;
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#888;
}

.section-title{
font-size:40px;
text-align:center;
margin:60px 0 30px;
color:#00d9ff;
}

.indices-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
}

.index-card{
background:#111;
padding:25px;
border-radius:18px;
border:1px solid #222;
}

.index-name{
color:#00d9ff;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.index-price{
font-size:38px;
font-weight:bold;
}

.index-change{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.positive{
color:#00ff88;
}

.negative{
color:#ff4d4d;
}

.heatmap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
padding:20px;
}

.heat-card{
padding:18px;
border-radius:12px;
text-align:center;
font-weight:bold;
color:white;
}

.search-sort{
display:flex;
gap:15px;
padding:20px;
flex-wrap:wrap;
}

.search-sort input,
.search-sort select{
padding:15px;
border-radius:10px;
border:1px solid #222;
background:#111;
color:white;
font-size:15px;
}

.stock-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
padding:20px;
}

.stock-card{
background:#111;
padding:20px;
border-radius:18px;
border:1px solid #222;
cursor:pointer;
transition:.3s;
position:relative;
}

.stock-card:hover{
transform:translateY(-5px);
border-color:#00d9ff;
}

.stock-name{
font-size:20px;
font-weight:bold;
}

.stock-price{
font-size:34px;
font-weight:bold;
margin:10px 0;
}

.stock-change{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.stock-details{
font-size:14px;
line-height:1.8;
color:#aaa;
}

.watch-btn{
position:absolute;
top:15px;
right:15px;
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

.tap-chart{
margin-top:15px;
padding:12px;
background:#151515;
border-radius:10px;
text-align:center;
font-size:13px;
color:#888;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
padding:15px;
z-index:9999;
}

.modal-content{
width:100%;
max-width:1200px;
height:95vh;
background:#0b0b0b;
border-radius:20px;
overflow:hidden;
position:relative;
}

.close-btn{
position:absolute;
top:10px;
right:20px;
font-size:40px;
color:white;
cursor:pointer;
z-index:100;
}

#largeChart{
width:100%;
height:100%;
border:none;
}

footer{
margin-top:70px;
padding:40px;
text-align:center;
background:#0d0d0d;
border-top:2px solid #00d9ff;
color:#777;
}

@media(max-width:768px){

.hero h1{
font-size:42px;
}

.section-title{
font-size:32px;
}

.stock-price{
font-size:28px;
}

.index-price{
font-size:30px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
NiftyDataHub Pro
</div>

<button class="theme-btn" onclick="toggleTheme()">
🌓 Theme
</button>

</header>

<div class="market-status">
🟢 MARKET OPEN • LIVE DELAYED DATA • AUTO REFRESH EVERY 60 SECONDS
</div>

<section class="hero">

<h1>
Indian Market Dashboard
</h1>

<p>
Professional Real-Time Analytics Platform
</p>

</section>

<h2 class="section-title">
Live Market Indices
</h2>

<div class="indices-grid" id="indicesContainer">
Loading...
</div>

<h2 class="section-title">
Market Heatmap
</h2>

<div class="heatmap" id="heatmap">
Loading...
</div>

<h2 class="section-title">
Market Tiles
</h2>

<div class="search-sort">

<input
type="text"
id="searchInput"
placeholder="Search Stock..."
onkeyup="searchStocks()"
>

<select id="sortSelect" onchange="sortStocks()">

<option value="">Sort By</option>
<option value="priceHigh">Price High</option>
<option value="priceLow">Price Low</option>
<option value="changeHigh">Top Gainers</option>
<option value="changeLow">Top Losers</option>

</select>

</div>

<div id="stockGrid" class="stock-grid">
Loading...
</div>

<div class="modal" id="chartModal">

<div class="modal-content">

<div class="close-btn" onclick="closeChart()">
×
</div>

<iframe id="largeChart"></iframe>

</div>

</div>

<footer>

© 2026 NiftyDataHub Pro

</footer>

<script>

const STOCKS_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQp9P30QbhWlYzbPIdYUjhlmL8oVseRGo5vMYoIPrLpy2oEmok6kC1QAbpDBXkEX-9oiD7YcAACo2Lw/pub?gid=0&single=true&output=csv";

const INDICES_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQp9P30QbhWlYzbPIdYUjhlmL8oVseRGo5vMYoIPrLpy2oEmok6kC1QAbpDBXkEX-9oiD7YcAACo2Lw/pub?gid=1647598626&single=true&output=csv";

let allStocks = [];

async function loadIndices(){

const response =
await fetch(`${INDICES_URL}&t=${Date.now()}`);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

const container =
document.getElementById("indicesContainer");

container.innerHTML = "";

rows.forEach(row=>{

const cols = row.split(",");

const name = cols[0];
const price = cols[1];
const change = cols[2];

const positive =
!change.includes("-");

container.innerHTML += `

<div class="index-card">

<div class="index-name">
${name}
</div>

<div class="index-price">
${Number(price).toLocaleString("en-IN")}
</div>

<div class="index-change ${positive ? "positive":"negative"}">

${positive ? "▲":"▼"} ${change}

</div>

</div>

`;

});

}

async function loadStocks(){

const response =
await fetch(`${STOCKS_URL}&t=${Date.now()}`);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

allStocks = rows.map(row=>row.split(","));

renderStocks(allStocks);

renderHeatmap(allStocks);

}

function renderStocks(data){

const grid =
document.getElementById("stockGrid");

grid.innerHTML = "";

data.forEach(cols=>{

if(cols.length < 9) return;

const stock = cols[0];
const price = cols[1];
const high52 = cols[2];
const low52 = cols[3];
const change = cols[4];
const dayLow = cols[5];
const dayHigh = cols[6];
const volume = cols[7];
const marketCap = cols[8];

const positive =
!change.includes("-");

grid.innerHTML += `

<div class="stock-card"

onclick="openChart(
'${stock}',
'${price}',
'${change}',
'${dayHigh}',
'${dayLow}',
'${high52}',
'${low52}',
'${volume}',
'${marketCap}'
)"

>

<button class="watch-btn">

☆</button>

<div class="stock-name">
${stock}
</div>

<div class="stock-price">
₹${Number(price).toLocaleString("en-IN")}
</div>

<div class="stock-change ${positive ? "positive":"negative"}">

${positive ? "▲":"▼"} ${change}%

</div>

<div class="stock-details">

Day H: ${dayHigh}<br>
Day L: ${dayLow}<br>
52W H: ${high52}<br>
52W L: ${low52}<br>
Vol: ${Number(volume).toLocaleString("en-IN")}<br>
MCap: ₹${Number(marketCap).toLocaleString("en-IN")}

</div>

<div class="tap-chart">

Tap Card For Full Chart 📈

</div>

</div>

`;

});

}

function renderHeatmap(data){

const heatmap =
document.getElementById("heatmap");

heatmap.innerHTML = "";

data.slice(0,20).forEach(cols=>{

const stock = cols[0];
const change = parseFloat(cols[4]);

const bg =
change >= 0
? "#00aa55"
: "#cc3333";

heatmap.innerHTML += `

<div class="heat-card"
style="background:${bg}">

${stock}<br>
${change}%

</div>

`;

});

}

function searchStocks(){

const input =
document.getElementById("searchInput")
.value
.toUpperCase();

const filtered =
allStocks.filter(stock=>

stock[0].toUpperCase().includes(input)

);

renderStocks(filtered);

}

function sortStocks(){

const value =
document.getElementById("sortSelect").value;

let sorted = [...allStocks];

if(value === "priceHigh"){

sorted.sort((a,b)=>
parseFloat(b[1]) - parseFloat(a[1])
);

}

if(value === "priceLow"){

sorted.sort((a,b)=>
parseFloat(a[1]) - parseFloat(b[1])
);

}

if(value === "changeHigh"){

sorted.sort((a,b)=>
parseFloat(b[4]) - parseFloat(a[4])
);

}

if(value === "changeLow"){

sorted.sort((a,b)=>
parseFloat(a[4]) - parseFloat(b[4])
);

}

renderStocks(sorted);

}

function openChart(stock,price,change,dayHigh,dayLow,high52,low52,volume,mcap){

document.getElementById("chartModal").style.display = "flex";

const positive = !change.includes("-");

document.getElementById("largeChart").srcdoc = `

<html>

<head>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
padding:20px;
}

.stock-name{
font-size:38px;
font-weight:bold;
}

.stock-price{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.green{
color:#00cc66;
}

.red{
color:#ff4d4d;
}

.details{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:25px;
}

.box{
background:#111;
padding:18px;
border-radius:14px;
}

.label{
font-size:13px;
color:#888;
margin-bottom:8px;
}

.value{
font-size:22px;
font-weight:bold;
}

.chart{
margin-top:25px;
height:500px;
border-radius:18px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<div class="stock-name">
${stock}
</div>

<div class="stock-price">
₹${price}
</div>

<div class="${positive ? "green":"red"}">

${positive ? "▲":"▼"} ${change}%

</div>

<div class="details">

<div class="box">
<div class="label">Day High</div>
<div class="value">${dayHigh}</div>
</div>

<div class="box">
<div class="label">Day Low</div>
<div class="value">${dayLow}</div>
</div>

<div class="box">
<div class="label">52W High</div>
<div class="value">${high52}</div>
</div>

<div class="box">
<div class="label">52W Low</div>
<div class="value">${low52}</div>
</div>

<div class="box">
<div class="label">Volume</div>
<div class="value">${volume}</div>
</div>

<div class="box">
<div class="label">Market Cap</div>
<div class="value">${mcap}</div>
</div>

</div>

<div class="chart">

<iframe
src="https://s.tradingview.com/widgetembed/?symbol=NSE:${stock}&interval=D&theme=dark&style=1">
</iframe>

</div>

</body>

</html>

`;

}

function closeChart(){

document.getElementById("chartModal")
.style.display = "none";

}

function toggleTheme(){

document.body.classList.toggle("light");

}

loadIndices();
loadStocks();

setInterval(loadIndices,60000);
setInterval(loadStocks,60000);

</script>

</body>
</html>
