<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiftyDataHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

header{
position:sticky;
top:0;
z-index:1000;
background:#111;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00e5ff;
}

.logo{
font-size:34px;
font-weight:bold;
color:#00e5ff;
}

.menu-btn{
display:none;
font-size:34px;
cursor:pointer;
}

nav{
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:white;
font-size:17px;
transition:.3s;
}

nav a:hover{
color:#00e5ff;
}

.hero{
padding:90px 20px;
text-align:center;
background:linear-gradient(to bottom,#111,#0b0b0b);
}

.hero h1{
font-size:68px;
margin-bottom:20px;
}

.hero p{
font-size:24px;
color:#aaa;
margin-bottom:35px;
}

.hero-btn{
display:inline-block;
padding:16px 35px;
background:#00e5ff;
color:black;
font-size:20px;
font-weight:bold;
border-radius:12px;
text-decoration:none;
}

.section-title{
font-size:42px;
text-align:center;
margin:60px 0 30px;
color:#00e5ff;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:20px;
}

.card{
background:#161616;
padding:30px;
border-radius:20px;
border:1px solid #2b2b2b;
}

.card h2{
color:#00e5ff;
margin-bottom:15px;
font-size:30px;
}

.price{
font-size:52px;
font-weight:bold;
}

.change{
margin-top:10px;
font-size:18px;
color:#00ff88;
}

.screener{
padding:20px;
}

#searchInput{
width:100%;
padding:16px;
background:#161616;
border:1px solid #2a2a2a;
border-radius:12px;
color:white;
font-size:18px;
margin-bottom:20px;
outline:none;
}

.stock-list{
display:flex;
flex-direction:column;
gap:15px;
}

.stock-item{
display:grid;
grid-template-columns:repeat(5,1fr);
align-items:center;
background:#161616;
padding:18px;
border-radius:14px;
border:1px solid #2a2a2a;
text-align:center;
}

.green{
color:#00ff88;
font-weight:bold;
}

.red{
color:#ff4d4d;
font-weight:bold;
}

footer{
margin-top:60px;
padding:40px 20px;
text-align:center;
background:#111;
border-top:2px solid #00e5ff;
}

footer p{
color:#888;
}

@media(max-width:768px){

.menu-btn{
display:block;
}

nav{
display:none;
position:absolute;
top:80px;
right:15px;
background:#161616;
padding:20px;
border-radius:15px;
flex-direction:column;
width:220px;
}

nav.show{
display:flex;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
}

.stock-item{
grid-template-columns:1fr;
gap:8px;
font-size:14px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
NiftyDataHub
</div>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<nav id="menu">

<a href="#">Home</a>
<a href="#">Market</a>
<a href="#">News</a>
<a href="#">Analysis</a>
<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Indian Stock Market Dashboard</h1>

<p>
Live Delayed Market Data & Trading Insights
</p>

<a href="#" class="hero-btn">
Explore Market
</a>

</section>

<h2 class="section-title">
Market Overview
</h2>

<section class="cards">

<div class="card">
<h2>NIFTY 50</h2>
<div class="price">LIVE</div>
<div class="change">Real Delayed Data</div>
</div>

<div class="card">
<h2>BANK NIFTY</h2>
<div class="price">LIVE</div>
<div class="change">Real Delayed Data</div>
</div>

</section>

<h2 class="section-title">
Nifty 50 Screener
</h2>

<section class="screener">

<input
type="text"
id="searchInput"
placeholder="Search Stock..."
onkeyup="searchStock()"
>

<div class="stock-list">
</div>

</section>

<footer>

<p>
© 2026 NiftyDataHub • Educational Purpose Only
</p>

</footer>

<script>

function toggleMenu() {
document.getElementById("menu").classList.toggle("show");
}

const stockSymbols = [
"RELIANCE.NS",
"TCS.NS",
"INFY.NS",
"HDFCBANK.NS",
"ICICIBANK.NS",
"SBIN.NS",
"ITC.NS",
"LT.NS",
"AXISBANK.NS",
"KOTAKBANK.NS"
];

async function loadStocks() {

const stockList =
document.querySelector(".stock-list");

stockList.innerHTML =
"<p style='text-align:center'>Loading live market data...</p>";

try {

const url =
"https://query1.finance.yahoo.com/v7/finance/quote?symbols=" +
stockSymbols.join(",");

const response =
await fetch(url);

const data =
await response.json();

const stocks =
data.quoteResponse.result;

stockList.innerHTML = "";

stocks.forEach(stock => {

const color =
stock.regularMarketChangePercent >= 0
? "green"
: "red";

stockList.innerHTML += `

<div class="stock-item">

<span>
${stock.symbol.replace(".NS","")}
</span>

<span>
₹${stock.regularMarketPrice || "-"}
</span>

<span>
52H: ₹${stock.fiftyTwoWeekHigh || "-"}
</span>

<span>
52L: ₹${stock.fiftyTwoWeekLow || "-"}
</span>

<span class="${color}">
${stock.regularMarketChangePercent?.toFixed(2) || 0}%
</span>

</div>

`;

});

} catch(error) {

stockList.innerHTML =
"<p style='color:red;text-align:center'>Unable to load live data.</p>";

console.log(error);

}

}

loadStocks();

function searchStock(){

let input =
document.getElementById("searchInput")
.value
.toUpperCase();

let items =
document.querySelectorAll(".stock-item");

items.forEach(item => {

let text =
item.innerText;

if(text.toUpperCase().indexOf(input) > -1){

item.style.display = "";

}else{

item.style.display = "none";

}

});

}

</script>

</body>
</html>
