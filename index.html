<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NiftyDataHub Pro</title>

<style>

:root{
--bg:#050505;
--card:#111;
--text:#fff;
--border:#222;
--primary:#00d9ff;
}

.light-mode{
--bg:#f4f4f4;
--card:#fff;
--text:#111;
--border:#ddd;
--primary:#0066ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
transition:.3s;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:1000;
background:var(--card);
padding:18px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid var(--primary);
}

.logo{
font-size:30px;
font-weight:bold;
color:var(--primary);
}

.header-right{
display:flex;
gap:15px;
align-items:center;
}

.theme-btn{
padding:10px 16px;
border:none;
border-radius:10px;
background:var(--primary);
color:#000;
font-weight:bold;
cursor:pointer;
}

/* HERO */

.hero{
padding:70px 20px;
text-align:center;
}

.hero h1{
font-size:52px;
margin-bottom:18px;
}

.hero p{
font-size:18px;
color:#888;
margin-bottom:30px;
}

/* TITLES */

.section-title{
font-size:32px;
text-align:center;
margin:50px 0 25px;
color:var(--primary);
}

/* INDICES */

.indices-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
padding:20px;
}

.index-card{
background:var(--card);
padding:18px;
border-radius:16px;
border:1px solid var(--border);
}

.index-name{
color:var(--primary);
font-size:15px;
font-weight:bold;
margin-bottom:10px;
}

.index-price{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.positive{
color:#00cc66;
}

.negative{
color:#ff4d4d;
}

/* CONTROLS */

.controls{
display:flex;
gap:15px;
padding:20px;
flex-wrap:wrap;
}

.controls input,
.controls select{
padding:14px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
}

/* STOCK GRID */

.stock-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
padding:20px;
}

.stock-card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
transition:.3s;
position:relative;
}

.stock-card:hover{
transform:translateY(-4px);
border-color:var(--primary);
}

.watchlist-btn{
position:absolute;
top:12px;
right:12px;
cursor:pointer;
font-size:18px;
}

.stock-name{
font-size:15px;
font-weight:bold;
margin-bottom:8px;
cursor:pointer;
}

.stock-price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.stock-details{
font-size:12px;
line-height:1.7;
color:#999;
}

.stock-chart{
height:40px;
margin-top:12px;
overflow:hidden;
border-radius:10px;
}

/* HEATMAP */

.heatmap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
padding:20px;
}

.heat-tile{
padding:20px;
border-radius:14px;
text-align:center;
font-weight:bold;
color:white;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:9999;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:#111;
width:100%;
max-width:1000px;
height:600px;
border-radius:20px;
overflow:hidden;
position:relative;
}

.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:28px;
cursor:pointer;
color:white;
z-index:10;
}

/* FOOTER */

footer{
margin-top:50px;
padding:35px;
text-align:center;
border-top:2px solid var(--primary);
background:var(--card);
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:36px;
}

.stock-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<header>

<div class="logo">
NiftyDataHub Pro
</div>

<div class="header-right">

<button class="theme-btn" onclick="toggleTheme()">
🌙 Theme
</button>

</div>

</header>

<!-- HERO -->

<section class="hero">

<h1>
Indian Market Dashboard
</h1>

<p>
Professional Real-Time Analytics Platform
</p>

</section>

<!-- INDICES -->

<h2 class="section-title">
Live Market Indices
</h2>

<div class="indices-grid" id="indicesContainer">
Loading...
</div>

<!-- HEATMAP -->

<h2 class="section-title">
Market Heatmap
</h2>

<div class="heatmap" id="heatmap">
Loading...
</div>

<!-- CONTROLS -->

<h2 class="section-title">
Market Tiles
</h2>

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="Search Stock..."
onkeyup="searchStocks()"
>

<select id="sortSelect" onchange="sortStocks()">

<option value="default">
Sort By
</option>

<option value="gainers">
Top Gainers
</option>

<option value="losers">
Top Losers
</option>

<option value="volume">
Highest Volume
</option>

<option value="marketcap">
Largest Market Cap
</option>

</select>

</div>

<!-- STOCK GRID -->

<div class="stock-grid" id="stockGrid">
Loading...
</div>

<!-- CHART MODAL -->

<div class="modal" id="chartModal">

<div class="modal-content">

<div class="close-btn" onclick="closeChart()">
×
</div>

<iframe
id="largeChart"
width="100%"
height="100%"
frameborder="0">
</iframe>

</div>

</div>

<!-- FOOTER -->

<footer>

© 2026 NiftyDataHub Pro

</footer>

<script>

/* URLS */

const STOCKS_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQp9P30QbhWlYzbPIdYUjhlmL8oVseRGo5vMYoIPrLpy2oEmok6kC1QAbpDBXkEX-9oiD7YcAACo2Lw/pub?gid=0&single=true&output=csv";

const INDICES_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQp9P30QbhWlYzbPIdYUjhlmL8oVseRGo5vMYoIPrLpy2oEmok6kC1QAbpDBXkEX-9oiD7YcAACo2Lw/pub?gid=1647598626&single=true&output=csv";

let allStocks = [];
let watchlist =
JSON.parse(localStorage.getItem("watchlist")) || [];

/* LOAD INDICES */

async function loadIndices(){

const response =
await fetch(`${INDICES_URL}&t=${Date.now()}`);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

const container =
document.getElementById("indicesContainer");

container.innerHTML = "";

rows.forEach(row=>{

const cols = row.split(",");

const positive =
!cols[2].includes("-");

container.innerHTML += `

<div class="index-card">

<div class="index-name">
${cols[0]}
</div>

<div class="index-price">
${cols[1]}
</div>

<div class="${positive ? "positive":"negative"}">
${positive ? "▲":"▼"} ${cols[2]}
</div>

</div>

`;

});

}

/* LOAD STOCKS */

async function loadStocks(){

const response =
await fetch(`${STOCKS_URL}&t=${Date.now()}`);

const csv =
await response.text();

allStocks =
csv.trim().split("\n").slice(1);

renderStocks(allStocks);

renderHeatmap(allStocks);

}

/* RENDER STOCKS */

function renderStocks(stocks){

const grid =
document.getElementById("stockGrid");

grid.innerHTML = "";

stocks.forEach(row=>{

const cols = row.split(",");

if(cols.length < 9) return;

const stock = cols[0];
const price = cols[1];
const high52 = cols[2];
const low52 = cols[3];
const change = cols[4];
const dayLow = cols[5];
const dayHigh = cols[6];
const volume = cols[7];
const marketCap = cols[8];

const positive =
!change.includes("-");

const saved =
watchlist.includes(stock);

grid.innerHTML += `

<div class="stock-card">

<div class="watchlist-btn"
onclick="toggleWatchlist('${stock}')">

${saved ? "⭐":"☆"}

</div>

<div class="stock-name"
onclick="openChart('${stock}')">

${stock}

</div>

<div class="stock-price">

₹${Number(price).toLocaleString("en-IN")}

</div>

<div class="${positive ? "positive":"negative"}">

${positive ? "▲":"▼"} ${change}%

</div>

<div class="stock-details">

Day H: ${dayHigh}<br>
Day L: ${dayLow}<br>

52W H: ${high52}<br>
52W L: ${low52}<br>

Vol: ${Number(volume).toLocaleString("en-IN")}<br>

MCap: ₹${marketCap}

</div>

<div class="stock-chart">

<iframe
src="https://s.tradingview.com/widgetembed/?symbol=NSE:${stock}&interval=D&theme=dark&style=1&locale=en"
width="100%"
height="40"
frameborder="0"
scrolling="no">
</iframe>

</div>

</div>

`;

});

}

/* SEARCH */

function searchStocks(){

let input =
document.getElementById("searchInput")
.value
.toUpperCase();

let filtered =
allStocks.filter(row =>
row.toUpperCase().includes(input)
);

renderStocks(filtered);

}

/* SORTING */

function sortStocks(){

const type =
document.getElementById("sortSelect").value;

let sorted = [...allStocks];

if(type==="gainers"){

sorted.sort((a,b)=>
parseFloat(b.split(",")[4]) -
parseFloat(a.split(",")[4])
);

}

if(type==="losers"){

sorted.sort((a,b)=>
parseFloat(a.split(",")[4]) -
parseFloat(b.split(",")[4])
);

}

if(type==="volume"){

sorted.sort((a,b)=>
parseFloat(b.split(",")[7]) -
parseFloat(a.split(",")[7])
);

}

renderStocks(sorted);

}

/* WATCHLIST */

function toggleWatchlist(stock){

if(watchlist.includes(stock)){

watchlist =
watchlist.filter(s=>s!==stock);

}else{

watchlist.push(stock);

}

localStorage.setItem(
"watchlist",
JSON.stringify(watchlist)
);

renderStocks(allStocks);

}

/* LARGE CHART */

function openChart(stock){

document.getElementById("chartModal")
.style.display = "flex";

document.getElementById("largeChart")
.src =
`https://s.tradingview.com/widgetembed/?symbol=NSE:${stock}&interval=D&theme=dark`;

}

function closeChart(){

document.getElementById("chartModal")
.style.display = "none";

}

/* HEATMAP */

function renderHeatmap(stocks){

const heatmap =
document.getElementById("heatmap");

heatmap.innerHTML = "";

stocks.slice(0,20).forEach(row=>{

const cols = row.split(",");

const stock = cols[0];
const change = parseFloat(cols[4]);

const color =
change >= 0
? "#00aa55"
: "#cc3333";

heatmap.innerHTML += `

<div class="heat-tile"
style="background:${color}">

${stock}<br>

${change}%

</div>

`;

});

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light-mode");

}

/* AUTO LOAD */

loadIndices();
loadStocks();

setInterval(loadIndices,60000);
setInterval(loadStocks,60000);

</script>

</body>
</html>
